basePath: /api/v1
definitions:
  appresponse.ErrorInfo:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  appresponse.Meta:
    properties:
      page:
        type: integer
      per_page:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  appresponse.Response:
    properties:
      data: {}
      error:
        $ref: '#/definitions/appresponse.ErrorInfo'
      meta:
        $ref: '#/definitions/appresponse.Meta'
      success:
        type: boolean
    type: object
  dto.AddMembersRequest:
    properties:
      members:
        items:
          $ref: '#/definitions/dto.MemberRolePair'
        type: array
    required:
    - members
    type: object
  dto.AssignLabelsRequest:
    properties:
      label_ids:
        items:
          type: string
        type: array
    required:
    - label_ids
    type: object
  dto.AssignMembersRequest:
    properties:
      user_ids:
        items:
          type: string
        type: array
    required:
    - user_ids
    type: object
  dto.AssignPermissionsRequest:
    properties:
      permission_ids:
        items:
          type: string
        type: array
    required:
    - permission_ids
    type: object
  dto.ChangePasswordRequest:
    properties:
      confirm_password:
        type: string
      current_password:
        type: string
      new_password:
        minLength: 8
        type: string
    required:
    - confirm_password
    - current_password
    - new_password
    type: object
  dto.CreateAnnouncementRequest:
    properties:
      content:
        type: string
      target_roles:
        items:
          type: string
        type: array
      title:
        type: string
    required:
    - content
    - title
    type: object
  dto.CreateColumnRequest:
    properties:
      title:
        type: string
    required:
    - title
    type: object
  dto.CreateCommentRequest:
    properties:
      content:
        type: string
    required:
    - content
    type: object
  dto.CreateInviteRequest:
    properties:
      expires_at:
        type: string
      max_uses:
        type: integer
      role:
        type: string
    type: object
  dto.CreateLabelRequest:
    properties:
      color:
        type: string
      name:
        type: string
    required:
    - color
    - name
    type: object
  dto.CreateProjectRequest:
    properties:
      background:
        type: string
      icon:
        type: string
      key:
        type: string
      name:
        type: string
    required:
    - key
    - name
    type: object
  dto.CreateRoleRequest:
    properties:
      description:
        type: string
      name:
        type: string
      permission_ids:
        items:
          type: string
        type: array
    required:
    - name
    type: object
  dto.CreateSubtaskRequest:
    properties:
      assignee_ids:
        items:
          type: string
        type: array
      due_date:
        type: string
      priority:
        type: string
      title:
        type: string
    required:
    - title
    type: object
  dto.CreateTaskRequest:
    properties:
      assignee_ids:
        items:
          type: string
        type: array
      column_id:
        type: string
      description:
        type: string
      due_date:
        type: string
      label_ids:
        items:
          type: string
        type: array
      priority:
        type: string
      start_date:
        type: string
      title:
        type: string
    required:
    - column_id
    - title
    type: object
  dto.CreateWorkspaceRequest:
    properties:
      domain:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  dto.DeleteAccountRequest:
    properties:
      confirmation:
        type: string
      password:
        type: string
    required:
    - confirmation
    type: object
  dto.DeleteColumnRequest:
    properties:
      strategy:
        type: string
      target_column_id:
        type: string
    type: object
  dto.DeleteProjectRequest:
    properties:
      confirmation_name:
        type: string
    required:
    - confirmation_name
    type: object
  dto.DeleteWorkspaceRequest:
    properties:
      confirmation_name:
        type: string
    required:
    - confirmation_name
    type: object
  dto.ForgotPasswordRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  dto.LeaveProjectRequest:
    properties:
      confirmation:
        type: boolean
    required:
    - confirmation
    type: object
  dto.LeaveWorkspaceRequest:
    properties:
      confirmation:
        type: boolean
    required:
    - confirmation
    type: object
  dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  dto.LogoutRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  dto.MarkAllAsReadRequest:
    properties:
      type:
        type: string
    type: object
  dto.MemberRolePair:
    properties:
      role_id:
        type: string
      user_id:
        type: string
    required:
    - role_id
    - user_id
    type: object
  dto.MoveTaskRequest:
    properties:
      column_id:
        type: string
      next_position:
        type: number
      previous_position:
        type: number
    required:
    - column_id
    type: object
  dto.RefreshTokenRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  dto.RegisterRequest:
    properties:
      confirm_password:
        type: string
      email:
        type: string
      full_name:
        type: string
      password:
        minLength: 8
        type: string
      phone_number:
        type: string
      username:
        maxLength: 50
        minLength: 3
        type: string
    required:
    - confirm_password
    - email
    - full_name
    - password
    - phone_number
    - username
    type: object
  dto.RemoveLabelsRequest:
    properties:
      label_ids:
        items:
          type: string
        type: array
    required:
    - label_ids
    type: object
  dto.RemovePermissionsRequest:
    properties:
      permission_ids:
        items:
          type: string
        type: array
    required:
    - permission_ids
    type: object
  dto.ResetPasswordRequest:
    properties:
      confirm_password:
        type: string
      new_password:
        minLength: 8
        type: string
      token:
        type: string
    required:
    - confirm_password
    - new_password
    - token
    type: object
  dto.TransferOwnershipRequest:
    properties:
      confirmation:
        type: string
      new_owner_id:
        type: string
    required:
    - confirmation
    - new_owner_id
    type: object
  dto.UnassignMembersRequest:
    properties:
      user_ids:
        items:
          type: string
        type: array
    required:
    - user_ids
    type: object
  dto.UpdateColumnPositionRequest:
    properties:
      next_position:
        type: number
      previous_position:
        type: number
    type: object
  dto.UpdateColumnTitleRequest:
    properties:
      title:
        type: string
    required:
    - title
    type: object
  dto.UpdateCommentRequest:
    properties:
      content:
        type: string
    required:
    - content
    type: object
  dto.UpdateLabelRequest:
    properties:
      color:
        type: string
      name:
        minLength: 1
        type: string
    type: object
  dto.UpdateMemberRoleRequest:
    properties:
      role:
        type: string
    required:
    - role
    type: object
  dto.UpdateProfileRequest:
    properties:
      full_name:
        minLength: 1
        type: string
      username:
        minLength: 3
        type: string
    type: object
  dto.UpdateProjectMemberRoleRequest:
    properties:
      role_id:
        type: string
    required:
    - role_id
    type: object
  dto.UpdateProjectRequest:
    properties:
      background:
        type: string
      icon:
        type: string
      name:
        minLength: 1
        type: string
    type: object
  dto.UpdateRoleRequest:
    properties:
      description:
        type: string
      name:
        minLength: 1
        type: string
    type: object
  dto.UpdateTaskRequest:
    properties:
      description:
        type: string
      due_date:
        type: string
      priority:
        type: string
      start_date:
        type: string
      title:
        minLength: 1
        type: string
    type: object
  dto.UpdateWorkspaceRequest:
    properties:
      domain:
        type: string
      name:
        minLength: 1
        type: string
    type: object
  dto.UpgradePlanRequest:
    properties:
      new_plan:
        type: string
    required:
    - new_plan
    type: object
host: localhost:8080
info:
  contact:
    email: support@taskflow.io
    name: TaskFlow Support
  description: Task management API with workspace, project, and team collaboration
    features.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://taskflow.io/terms
  title: TaskFlow API
  version: "1.0"
paths:
  /auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Send password reset email to the given email address
      parameters:
      - description: Registered email
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/appresponse.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/appresponse.Response'
      summary: Request password reset
      tags:
      - Auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user with email and password, returns JWT tokens
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/appresponse.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/appresponse.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/appresponse.Response'
      summary: Login user
      tags:
      - Auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Invalidate refresh token to log out
      parameters:
      - description: Refresh token to invalidate
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LogoutRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/appresponse.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/appresponse.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/appresponse.Response'
      security:
      - BearerAuth: []
      summary: Logout user
      tags:
      - Auth
  /auth/oauth/github:
    get:
      description: Redirect user to GitHub OAuth consent screen
      produces:
      - application/json
      responses:
        "302":
          description: Found
      summary: Initiate GitHub OAuth login
      tags:
      - Auth
  /auth/oauth/github/callback:
    get:
      description: Handle GitHub OAuth callback and return JWT tokens
      parameters:
      - description: Authorization code from GitHub
        in: query
        name: code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "302":
          description: Found
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/appresponse.Response'
      summary: GitHub OAuth callback
      tags:
      - Auth
  /auth/oauth/google:
    get:
      description: Redirect user to Google OAuth consent screen
      produces:
      - application/json
      responses:
        "302":
          description: Found
      summary: Initiate Google OAuth login
      tags:
      - Auth
  /auth/oauth/google/callback:
    get:
      description: Handle Google OAuth callback and return JWT tokens
      parameters:
      - description: Authorization code from Google
        in: query
        name: code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "302":
          description: Found
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/appresponse.Response'
      summary: Google OAuth callback
      tags:
      - Auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Get a new access token using a valid refresh token
      parameters:
      - description: Refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/appresponse.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/appresponse.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/appresponse.Response'
      summary: Refresh access token
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Create a new user account with email and password
      parameters:
      - description: Registration details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/appresponse.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/appresponse.Response'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/appresponse.Response'
      summary: Register a new user
      tags:
      - Auth
  /auth/reset-password:
    post:
      consumes:
      - application/json
      description: Reset password using the token from the reset email
      parameters:
      - description: Reset token and new password
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/appresponse.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/appresponse.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/appresponse.Response'
      summary: Reset password
      tags:
      - Auth
  /permissions:
    get:
      consumes:
      - application/json
      description: List all permissions, optionally grouped by module
      parameters:
      - default: true
        description: Group by module
        in: query
        name: grouped
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/appresponse.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/appresponse.Response'
      security:
      - BearerAuth: []
      summary: List all permissions
      tags:
      - Permissions
  /permissions/{id_or_slug}:
    get:
      consumes:
      - application/json
      description: Get a single permission by its ID or slug
      parameters:
      - description: Permission ID or slug
        in: path
        name: id_or_slug
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/appresponse.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/appresponse.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/appresponse.Response'
      security:
      - BearerAuth: []
      summary: Get permission by ID or slug
      tags:
      - Permissions
  /permissions/modules:
    get:
      consumes:
      - application/json
      description: List all permission modules
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/appresponse.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/appresponse.Response'
      security:
      - BearerAuth: []
      summary: List permission modules
      tags:
      - Permissions
  /permissions/modules/{module}:
    get:
      consumes:
      - application/json
      description: Get all permissions for a specific module
      parameters:
      - description: Module name
        in: path
        name: module
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/appresponse.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/appresponse.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/appresponse.Response'
      security:
      - BearerAuth: []
      summary: Get permissions by module
      tags:
      - Permissions
  /users/me:
    delete:
      consumes:
      - application/json
      description: Permanently delete the current user's account
      parameters:
      - description: Account deletion confirmation
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.DeleteAccountRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/appresponse.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/appresponse.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/appresponse.Response'
      security:
      - BearerAuth: []
      summary: Delete account
      tags:
      - Users
    get:
      consumes:
      - application/json
      description: Get the current authenticated user's profile
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/appresponse.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/appresponse.Response'
      security:
      - BearerAuth: []
      summary: Get user profile
      tags:
      - Users
    patch:
      consumes:
      - application/json
      description: Update the current user's profile information
      parameters:
      - description: Profile update data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/appresponse.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/appresponse.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/appresponse.Response'
      security:
      - BearerAuth: []
      summary: Update user profile
      tags:
      - Users
  /users/me/avatar:
    delete:
      consumes:
      - application/json
      description: Remove the current user's avatar
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/appresponse.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/appresponse.Response'
      security:
      - BearerAuth: []
      summary: Remove avatar
      tags:
      - Users
    post:
      consumes:
      - multipart/form-data
      description: Upload a new avatar image for the current user
      parameters:
      - description: Avatar image file
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/appresponse.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/appresponse.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/appresponse.Response'
      security:
      - BearerAuth: []
      summary: Upload avatar
      tags:
      - Users
  /users/me/password:
    put:
      consumes:
      - application/json
      description: Change the current user's password
      parameters:
      - description: Password change data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/appresponse.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/appresponse.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/appresponse.Response'
      security:
      - BearerAuth: []
      summary: Change password
      tags:
      - Users
  /users/me/sessions:
    delete:
      consumes:
      - application/json
      description: Revoke all sessions except the current one
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/appresponse.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/appresponse.Response'
      security:
      - BearerAuth: []
      summary: Revoke all other sessions
      tags:
      - Users
    get:
      consumes:
      - application/json
      description: Get all active sessions for the current user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/appresponse.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/appresponse.Response'
      security:
      - BearerAuth: []
      summary: List user sessions
      tags:
      - Users
  /users/me/sessions/{session_id}:
    delete:
      consumes:
      - application/json
      description: Revoke a specific session by ID
      parameters:
      - description: Session ID
        in: path
        name: session_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/appresponse.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/appresponse.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/appresponse.Response'
      security:
      - BearerAuth: []
      summary: Revoke a session
      tags:
      - Users
  /workspaces:
    get:
      consumes:
      - application/json
      description: Get all workspaces the current user belongs to
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/appresponse.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/appresponse.Response'
      security:
      - BearerAuth: []
      summary: List user's workspaces
      tags:
      - Workspaces
    post:
      consumes:
      - application/json
      description: Create a new workspace
      parameters:
      - description: Workspace details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateWorkspaceRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/appresponse.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/appresponse.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/appresponse.Response'
      security:
      - BearerAuth: []
      summary: Create workspace
      tags:
      - Workspaces
  /workspaces/{workspace_id}:
    delete:
      consumes:
      - application/json
      description: Permanently delete a workspace
      parameters:
      - description: Workspace ID
        in: path
        name: workspace_id
        required: true
        type: string
      - description: Deletion confirmation
        in: body
        name: request
